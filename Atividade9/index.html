<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca CEP</title>
</head>

<body>
    <H2>Formulário de CEP</H2>

    <label for="cep">Digite seu CEP:</label>
    <input type="text" id="cep" placeholder="Ex:01001000">
    <br><br>
    <label for="rua">Rua:</label>
    <input type="text" id="rua" placeholder="Ex: 10">
    <br><br>
    <label for="bairro">Bairro:</label>
    <input type="text" id="bairro" placeholder="Ex: meu bairro">
    <br><br>
    <label for="cidade">Cidade:</label>
    <input type="text" id="cidade" placeholder="Ex: brasilia">
    <br><br>
    <label for="uf">Estado:</label>
    <input type="text" id="uf" placeholder="Ex: DF">
    <script src="buscaCep.js"></script>
</body>

</html>
