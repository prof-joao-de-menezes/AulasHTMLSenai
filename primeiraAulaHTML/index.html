<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Primeira aula</title>
    <link rel="icon" type="image/png" href="https://marketplace.canva.com/AULfg/MAFTCIAULfg/1/tl/canva-red-minimalist-website-icon-MAFTCIAULfg.png">
</head>
<body>
    <h1>Acessar o Sistema</h1>
    <form>
        <div>
            <label for="campo-email">E-mail:</label>
            <input type="email" id="campo-email" placeholder="Ex: nome@email.com">
        </div>

        <div>
            <label for="campo-senha">Senha:</label>
            <input type="password" id="campo-senha">
        </div>
        <button type="submit">Entrar</button>
    </form>

    <p>
        <a href="#">Esqueci minha senha</a> | 
        <a href="cadastro.html">Criar uma conta</a>
    </p>

</body>
</html>
